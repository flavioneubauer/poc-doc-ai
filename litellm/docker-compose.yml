# LiteLLM Gateway (AI Gateway) — container local que expõe uma API OpenAI-compatible
# e roteia para a OCI via assinatura NATIVA (Signature v1, usando a .pem do ~/.oci).
# Assim alcança Cohere/embeddings, que o endpoint OpenAI-compat da OCI não entrega.
#
# Subir:   docker compose -f litellm/docker-compose.yml up -d
# Logs:    docker compose -f litellm/docker-compose.yml logs -f litellm
# Derrubar: docker compose -f litellm/docker-compose.yml down   (add -v p/ apagar o DB)
#
# UI admin: http://localhost:4000/ui  (login com UI_USERNAME/UI_PASSWORD do litellm.env)
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-poc
    ports:
      - "4000:4000"
    env_file:
      - ./litellm.env            # credenciais OCI + master key + UI + DATABASE_URL (NÃO commitado)
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${HOME}/.oci/cert.pem:/keys/oci.pem:ro   # chave privada de assinatura (só leitura)
    environment:
      # URLs internas (não são segredo) do guardrail de PII. O guardrail em si
      # é ligado no config.yaml (default_on). Ver litellm/presidio/README.md.
      PRESIDIO_ANALYZER_API_BASE: "http://presidio-analyzer:3000"
      PRESIDIO_ANONYMIZER_API_BASE: "http://presidio-anonymizer:3000"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      db:
        condition: service_healthy
      presidio-analyzer:
        condition: service_healthy
      presidio-anonymizer:
        condition: service_healthy
    restart: unless-stopped

  # ---- Guardrail de PII/LGPD (Microsoft Presidio, OSS) ------------------------
  # analyzer: imagem custom (pt-BR + recognizers brasileiros com DV) — ver
  #           litellm/presidio/analyzer/. anonymizer: imagem oficial (mascara).
  presidio-analyzer:
    build:
      context: ./presidio/analyzer
    container_name: presidio-analyzer
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: presidio-anonymizer
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # Postgres — necessário para a UI (keys, times, uso, logs) e para persistir estado.
  db:
    image: postgres:16
    container_name: litellm-db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  litellm_pgdata:
